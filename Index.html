<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Água Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 16px;
  max-width: 500px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 100px;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
  <h2>💧 Água Pro</h2>

  <textarea id="dados" placeholder="02/04: 1,9"></textarea>

  <button onclick="calcular()">Calcular</button>

  <div id="resultado"></div>

  <canvas id="grafico"></canvas>
</div>

<script>
function extrairNumero(l) {
  let m = l.match(/[\d,.]+$/);
  return m ? parseFloat(m[0].replace(",", ".")) : NaN;
}

function calcularConta(t) {
  if (t <= 10) return 80.84;
  if (t <= 20) return 80.84 + (t - 10) * 12.8;
  if (t <= 50) return 80.84 + (1012.8) + (t - 20)31.9;
  return 80.84 + (1012.8) + (3031.9) + (t - 50)*35.14;
}

function analisar(valores) {
  let media = valores.reduce((a,b)=>a+b,0)/valores.length;

  let desvio = Math.sqrt(
    valores.map(v => (v - media)**2).reduce((a,b)=>a+b,0) / valores.length
  );

  let alerta = "";
  if (media > 1.5) alerta += "🚨 Consumo alto<br>";
  if (desvio > 0.7) alerta += "⚠️ Consumo irregular<br>";

  return {media, desvio, alerta};
}

function calcular() {
  try {
    let texto = document.getElementById("dados").value;
    let linhas = texto.split("\n");

    let valores = [];

    linhas.forEach(l => {
      let v = extrairNumero(l);
      if (!isNaN(v)) valores.push(v);
    });

    if (valores.length === 0) {
      document.getElementById("resultado").innerHTML = "⚠️ Insira dados válidos";
      return;
    }

    let total = valores.reduce((a,b)=>a+b,0);
    let analise = analisar(valores);

    let proj = analise.media * 30;
    let conta = calcularConta(proj);

    let economia1 = conta - calcularConta(proj * 0.9);
    let economia2 = conta - calcularConta(proj * 0.8);

    document.getElementById("resultado").innerHTML =
      "<b>Consumo:</b> " + total.toFixed(1) + " m³<br>" +
      "<b>Média:</b> " + analise.media.toFixed(2) + "<br>" +
      "<b>Projeção:</b> " + proj.toFixed(1) + "<br>" +
      "<b>Conta:</b> R$ " + conta.toFixed(2) + "<br><br>" +
      analise.alerta +
      "💡 -10%: R$ " + economia1.toFixed(2) + "<br>" +
      "💡 -20%: R$ " + economia2.toFixed(2);

    localStorage.setItem("historico", JSON.stringify(valores));

    desenharGrafico(valores);

  } catch (erro) {
    document.getElementById("resultado").innerHTML = "❌ Erro no cálculo";
    console.log(erro);
  }
}

function desenharGrafico(valores) {
  try {
    if (window.graficoAtual) {
      window.graficoAtual.destroy();
    }

    window.graficoAtual = new Chart(document.getElementById("grafico"), {
      type: 'line',
      data: {
        labels: valores.map((_,i)=>"Dia "+(i+1)),
        datasets: [{
          label: 'Consumo',
          data: valores
        }]
      }
    });
  } catch (e) {
    console.log("Erro gráfico:", e);
  }
}

// offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html
