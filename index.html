<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Água Pro</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      padding: 20px;
      color: #fff;
      text-align: center;
    }

    .card {
      background: white;
      color: #333;
      border-radius: 16px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 95%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    #resultado {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .progress-container {
      margin-top: 20px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 20px;
      width: 0%;
      background: #00c6ff;
      transition: 0.4s;
    }

    .log {
      margin-top: 15px;
      font-size: 14px;
      text-align: left;
      max-height: 120px;
      overflow-y: auto;
    }

    .reset {
      background: #dc3545;
    }
  </style>
</head>

<body>

  <h1>💧 Água Pro</h1>

  <div class="card">

    <input type="number" id="peso" placeholder="Peso (kg)">
    <input type="number" id="atividade" placeholder="Atividade (min)">

    <button onclick="calcular()">Calcular Meta</button>

    <div id="resultado"></div>

    <div class="progress-container">
      <div class="progress-bar" id="barra"></div>
    </div>

    <p id="progressoTexto"></p>

    <button onclick="beber(250)">+250 ml</button>
    <button onclick="beber(500)">+500 ml</button>
    <button onclick="beber(1000)">+1L</button>

    <button class="reset" onclick="resetar()">Resetar Dia</button>

    <div class="log" id="log"></div>

  </div>

  <script>
    let meta = localStorage.getItem("meta") || 0;
    let consumo = localStorage.getItem("consumo") || 0;

    atualizarTela();

    function calcular() {
      const peso = document.getElementById("peso").value;
      const atividade = document.getElementById("atividade").value || 0;

      if (!peso) {
        alert("Digite o peso");
        return;
      }

      let aguaBase = peso * 35;
      let extra = atividade * 10;

      meta = Math.round((aguaBase + extra) / 1000 * 100) / 100;

      localStorage.setItem("meta", meta);

      document.getElementById("resultado").innerText =
        "Meta diária: " + meta + " L";

      atualizarTela();
    }

    function beber(ml) {
      consumo = Number(consumo) + ml;

      localStorage.setItem("consumo", consumo);

      adicionarLog(ml);

      atualizarTela();
    }

    function atualizarTela() {
      let metaMl = meta * 1000;

      let porcentagem = metaMl ? (consumo / metaMl) * 100 : 0;

      document.getElementById("barra").style.width =
        Math.min(porcentagem, 100) + "%";

      document.getElementById("progressoTexto").innerText =
        (consumo / 1000).toFixed(2) + "L / " + meta + "L";

      carregarLog();
    }

    function adicionarLog(ml) {
      let logs = JSON.parse(localStorage.getItem("logs") || "[]");

      let hora = new Date().toLocaleTimeString();

      logs.push(hora + " - +" + ml + "ml");

      localStorage.setItem("logs", JSON.stringify(logs));
    }

    function carregarLog() {
      let logs = JSON.parse(localStorage.getItem("logs") || "[]");

      document.getElementById("log").innerHTML =
        logs.slice().reverse().join("<br>");
    }

    function resetar() {
      consumo = 0;
      localStorage.setItem("consumo", 0);
      localStorage.setItem("logs", JSON.stringify([]));
      atualizarTela();
    }
  </script>

</body>
</html>
